<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - The Food Mania</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #855300;
            --primary-hover: #653e00;
            --bg-color: #f9f9ff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
        }
        h1, h2, h3, h4, h5, h6, .navbar-brand, .font-heading {
            font-family: 'Montserrat', sans-serif;
        }
        .text-primary-custom { color: var(--primary-color) !important; }
        .bg-primary-custom { background-color: var(--primary-color) !important; color: white; }
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        /* Typography overrides for injected content */
        .page-content h1, .page-content h2, .page-content h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #212529;
        }
        .page-content p {
            margin-bottom: 1rem;
        }
        .page-content ul, .page-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Minimal Header -->
    <header class="navbar navbar-expand-lg bg-white shadow-sm sticky-top py-3">
        <div class="container-fluid px-4" style="max-width: 1280px;">
            <a href="/" class="navbar-brand font-heading fw-bold text-primary-custom m-0 fs-4">The Food Mania</a>
            <a href="/" class="text-decoration-none text-muted fw-bold small d-flex align-items-center gap-2 hover-primary">
                <span class="material-symbols-outlined fs-6">arrow_back</span> Back to Home
            </a>
        </div>
    </header>

    <main class="flex-grow-1 container py-5" style="max-width: 800px;">
        <h1 class="display-5 fw-bold font-heading mb-4 text-primary-custom">{{ title }}</h1>
        <div class="card shadow-sm border-0 rounded-4 glass-panel">
            <div class="card-body p-4 p-md-5 text-muted page-content" style="line-height: 1.8;">
                {{ content|safe }}
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-5 mt-auto border-top">
        <div class="container text-center">
            <p class="text-white-50 small m-0">© 2024 The Food Mania. Epicurean Modernity.</p>
        </div>
    </footer>

    <!-- Enterprise Frontend Architecture -->
    <script src="/static/js/store.js"></script>
    <script src="/static/js/services/api.js"></script>
</body>
</html>
