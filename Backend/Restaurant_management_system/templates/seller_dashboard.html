<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - The Food Mania</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #855300;
            --primary-hover: #653e00;
            --bg-color: #f9f9ff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
        }
        h1, h2, h3, h4, h5, h6, .navbar-brand, .font-heading {
            font-family: 'Montserrat', sans-serif;
        }
        .text-primary-custom { color: var(--primary-color) !important; }
        .bg-primary-custom { background-color: var(--primary-color) !important; color: white; }
        .btn-primary-custom { background-color: var(--primary-color); color: white; border: none; }
        .btn-primary-custom:hover { background-color: var(--primary-hover); color: white; }
        
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .order-card {
            transition: all 0.2s ease;
        }
        .order-card:hover {
            border-color: rgba(133, 83, 0, 0.3) !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="navbar navbar-expand-lg bg-white shadow-sm sticky-top py-3">
        <div class="container-fluid px-4" style="max-width: 1280px;">
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="navbar-brand font-heading fw-bold text-primary-custom m-0 fs-4">The Food Mania</a>
                <span class="badge bg-secondary bg-opacity-10 text-secondary text-uppercase tracking-wider px-3 py-2 rounded-pill shadow-sm">Seller</span>
            </div>
            <div class="d-flex align-items-center gap-4">
                <button onclick="handleLogout()" class="btn btn-link text-danger text-decoration-none fw-bold small p-0 d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined fs-5">logout</span> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow-1 container py-5" style="max-width: 1280px;">
        <h1 class="display-6 fw-bold font-heading mb-5 text-primary-custom">Live Kitchen Feed</h1>
        
        <div class="row g-4">
            <section class="col-12">
                <div class="card shadow-sm border-0 rounded-4 glass-panel min-vh-50">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-5">
                            <h3 class="font-heading fw-bold fs-4 m-0">Active Orders</h3>
                            <span id="activeCount" class="badge bg-primary-custom px-3 py-2 rounded-pill fs-6">0 Pending</span>
                        </div>
                        
                        <div id="activeOrdersList" class="row g-4">
                            <div class="col-12 text-center py-5">
                                <div class="spinner-border text-warning mb-3" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="text-muted fst-italic">Loading orders...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="text-white-50 small m-0">© 2024 The Food Mania. Kitchen Terminal.</p>
        </div>
    </footer>

    <!-- Order Update Modal -->
    <div class="modal fade" id="updateModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-light border-bottom-0 p-4">
                    <div>
                        <h5 class="modal-title font-heading fw-bold">Update Order Status</h5>
                        <p id="modalOrderId" class="text-muted small font-monospace m-0 mt-1"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeModal()"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="d-flex flex-column gap-3">
                        <button onclick="updateStatus(2)" class="btn btn-outline-secondary text-start fw-bold p-3 rounded-3 d-flex align-items-center justify-content-between">
                            Preparing Food <span class="material-symbols-outlined fs-5">restaurant</span>
                        </button>
                        <button onclick="updateStatus(3)" class="btn btn-outline-secondary text-start fw-bold p-3 rounded-3 d-flex align-items-center justify-content-between">
                            Cooking <span class="material-symbols-outlined fs-5">skillet</span>
                        </button>
                        <button onclick="updateStatus(4)" class="btn btn-outline-secondary text-start fw-bold p-3 rounded-3 d-flex align-items-center justify-content-between">
                            Packaging <span class="material-symbols-outlined fs-5">takeout_dining</span>
                        </button>
                        <button onclick="updateStatus(5)" class="btn btn-outline-secondary text-start fw-bold p-3 rounded-3 d-flex align-items-center justify-content-between">
                            Rider Assigned <span class="material-symbols-outlined fs-5">two_wheeler</span>
                        </button>
                        <hr class="text-muted opacity-25 m-0">
                        <button onclick="updateStatus(9)" class="btn btn-outline-success text-start fw-bold p-3 rounded-3 d-flex align-items-center justify-content-between">
                            Mark as Delivered <span class="material-symbols-outlined fs-5">check_circle</span>
                        </button>
                    </div>
                </div>
                <div class="modal-footer border-top-0 p-4 pt-0">
                    <button type="button" class="btn btn-light w-100 fw-bold py-2" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentOrderId = null;
        let updateModalInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            updateModalInstance = new bootstrap.Modal(document.getElementById('updateModal'));
            loadOrders();
            setInterval(loadOrders, 30000); // Refresh every 30s
        });

        function loadOrders() {
            fetch('/shop/api/seller/dashboard/')
                .then(res => res.json())
                .then(orders => {
                    const list = document.getElementById('activeOrdersList');
                    document.getElementById('activeCount').textContent = `${orders.length} Pending`;
                    
                    if (orders.length === 0) {
                        list.innerHTML = `
                            <div class="col-12 text-center py-5">
                                <div class="bg-light rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 80px; height: 80px;">
                                    <span class="material-symbols-outlined text-success fs-1">task_alt</span>
                                </div>
                                <p class="text-muted fw-bold">All orders completed! Great job.</p>
                            </div>
                        `;
                        return;
                    }

                    list.innerHTML = orders.map(o => {
                        const items = JSON.parse(o.items_json);
                        return `
                            <div class="col-md-6 col-lg-4">
                                <div class="card shadow-sm border rounded-4 h-100 order-card bg-white">
                                    <div class="card-body p-4 d-flex flex-column">
                                        <div class="d-flex justify-content-between align-items-start mb-3 gap-2">
                                            <span class="text-muted font-monospace small">#${o.order_id.substring(0,8)}</span>
                                            <span class="badge bg-warning bg-opacity-25 text-primary-custom text-uppercase tracking-wider border shadow-sm">${escapeHTML(o.status_display)}</span>
                                        </div>
                                        <h5 class="fw-bold mb-3 font-heading text-dark">${escapeHTML(o.name)}</h5>
                                        <div class="flex-grow-1 d-flex flex-column gap-2 mb-4">
                                            ${items.map(item => `
                                                <div class="d-flex justify-content-between align-items-center small border-bottom pb-2">
                                                    <span class="text-muted"><span class="fw-bold text-dark">${escapeHTML(item.qty)}x</span> ${escapeHTML(item.name)}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="mt-auto">
                                            <button onclick="openModal('${o.order_id}')" class="btn btn-primary-custom w-100 fw-bold py-2 shadow-sm d-flex justify-content-center align-items-center gap-2">
                                                Update Status <span class="material-symbols-outlined fs-6">edit</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function openModal(id) {
            currentOrderId = id;
            document.getElementById('modalOrderId').textContent = `Order ID: ${id}`;
            if(updateModalInstance) updateModalInstance.show();
        }

        function closeModal() {
            if(updateModalInstance) updateModalInstance.hide();
        }

        function updateStatus(status) {
            alert('Status updated to ' + status + ' (Logic implementation pending endpoint)');
            closeModal();
        }

        function handleLogout() {
            fetch('/shop/api/logout/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            }).then(() => window.location.href = '/auth/');
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
